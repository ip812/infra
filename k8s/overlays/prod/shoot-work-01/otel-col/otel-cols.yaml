---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: opentelemetry-collector
  namespace: opentelemetry-operator-system
spec:
  mode: deployment
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: '[::]:4317'
          http:
            endpoint: '[::]:4318'
    processors:
      batch:
        send_batch_max_size: 4000
        send_batch_size: 2000
        timeout: 10s
      memory_limiter:
        check_interval: 1s
        limit_mib: 3000
        spike_limit_mib: 600
    exporters:
      otlphttp/victorialogs:
        compression: gzip
        encoding: proto
        logs_endpoint: http://vlsingle-logs.victoria.svc:9428/insert/opentelemetry/v1/logs
        headers:
          VL-Msg-Field: "log,body,message,msg"
          VL-Stream-Fields: "cluster,kubernetes.namespace_name,kubernetes.pod_name,kubernetes.container_name,service.name"
          VL-Time-Field: "time"
        tls:
          insecure: true
      debug:
        verbosity: basic
    service:
      telemetry:
        logs:
          encoding: json
          level: info
      pipelines:
        logs:
          receivers: 
            - otlp
          processors: 
            - memory_limiter
            - batch 
          exporters:
            - debug
            - otlphttp/victorialogs
