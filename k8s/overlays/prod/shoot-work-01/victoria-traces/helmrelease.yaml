---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-traces-single
  namespace: victoria-traces
spec:
  releaseName: vts
  interval: 10m
  chart:
    spec:
      chart: victoria-traces-single
      version: 0.0.8
      sourceRef:
        kind: HelmRepository
        name: vm
        namespace: victoria-traces
  valuesFrom:
    - kind: ConfigMap
      name: victoria-traces-values
