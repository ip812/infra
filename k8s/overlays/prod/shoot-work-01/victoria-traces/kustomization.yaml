resources:
- namespace.yaml
- helmrepository.yaml
- helmrelease.yaml
configMapGenerator:
  - name: victoria-traces-values
    namespace: victoria-traces
    options:
      disableNameSuffixHash: true
    files:
      - values.yaml=../../../../values/victoria-traces.yaml
