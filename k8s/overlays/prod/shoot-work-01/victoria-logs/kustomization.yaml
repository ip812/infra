---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- namespace.yaml
- helmrepository.yaml
- helmrelease.yaml
configMapGenerator:
  - name: victoria-logs-values
    namespace: victoria-logs
    options:
      disableNameSuffixHash: true
    files:
      - values.yaml=../../../../values/victoria-logs.yaml
