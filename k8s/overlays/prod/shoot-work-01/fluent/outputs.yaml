---
apiVersion: fluentbit.fluent.io/v1alpha2
kind: ClusterOutput
metadata:
  name: otel-http-output
  labels:
    fluentbit.fluent.io/enabled: "true"
    fluentbit.fluent.io/component: logging
spec:
  match: "*"
  opentelemetry:
    host: opentelemetry-collector-collector.opentelemetry-operator-system.svc
    port: 4318
    logsUri: /v1/logs
    tls:
      verify: false
