---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - github.com/VictoriaMetrics/operator/config/default?ref=v0.69.0
  - vlsingle.yaml
  - vtsingle.yaml
namespace: victoria
images:
  - name: manager
    newName: victoriametrics/operator
    newTag: v0.69.0
patches:
  - target:
      version: v1
      kind: Namespace
      name: vm
    patch: |
      - op: replace
        path: /metadata/name
        value: victoria
