---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring
  namespace: flux-system
spec:
  interval: 60s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/envs/prod/shoot-work-01/monitoring
  prune: true
  wait: true
  dependsOn:
    - name: doppler
      namespace: flux-system
