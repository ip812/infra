---
name: Terraform Apply Prod

on:
  push:
    branches:
      - main
    paths:
      - terraform/prod/**
  workflow_dispatch:

concurrency:
  group: terraform-apply-prod
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: terraform/prod

    env:
      AWS_ACCESS_KEY_ID:                   ${{ secrets.BACKUPS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:               ${{ secrets.BACKUPS_SECRET_ACCESS_KEY }}
      TF_VAR_aws_access_key_id:            ${{ secrets.AWS_ACCESS_KEY_ID }}
      TF_VAR_aws_secret_access_key:        ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_cf_api_token:                 ${{ secrets.CF_API_TOKEN }}
      TF_VAR_cf_account_id:                ${{ secrets.CF_ACCOUNT_ID }}
      TF_VAR_cf_ip812_zone_id:             ${{ secrets.CF_IP812_ZONE_ID }}
      TF_VAR_gh_access_token:              ${{ secrets.GH_ACCESS_TOKEN }}
      TF_VAR_cf_tunnel_secret:             ${{ secrets.CF_TUNNEL_SECRET }}
      TF_VAR_ts_tailnet:                   ${{ secrets.TS_TAILNET }}
      TF_VAR_ts_oauth_client_id:           ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TF_VAR_ts_oauth_client_secret:       ${{ secrets.TS_OAUTH_SECRET }}
      TF_VAR_pgadmin_email:                ${{ secrets.PGADMIN_EMAIL }}
      TF_VAR_pgadmin_password:             ${{ secrets.PGADMIN_PASSWORD }}
      TF_VAR_pg_username:                  ${{ secrets.PG_USERNAME }}
      TF_VAR_pg_password:                  ${{ secrets.PG_PASSWORD }}
      TF_VAR_backups_access_key_id:        ${{ secrets.BACKUPS_ACCESS_KEY_ID }}
      TF_VAR_backups_secret_access_key:    ${{ secrets.BACKUPS_SECRET_ACCESS_KEY }}
      TF_VAR_dp_token:                     ${{ secrets.DP_TOKEN }}
      TF_VAR_fd_email_1:                   ${{ secrets.FD_EMAIL_1 }}
      TF_VAR_fd_email_2:                   ${{ secrets.FD_EMAIL_2 }}
      TF_VAR_home_public_ip:               ${{ secrets.HOME_PUBLIC_IP }}
      TF_VAR_wg_proxmox_public_key:        ${{ secrets.WG_PROXMOX_PUBLIC_KEY }}
      TF_VAR_wg_shoot_work_01_private_key: ${{ secrets.WG_SHOOT_WORK_01_PRIVATE_KEY }}
                                                        
    steps:                                              
      - name: Checkout                                  
        uses: actions/checkout@v7                       
                                                        
      - name: Set up Tailscale                          
        uses: tailscale/github-action@v4                
        with:                                           
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}  
          tags: tag:ci                                  
                                                        
      - name: Set up Terraform                          
        uses: hashicorp/setup-terraform@v4              
                                                        
      - name: Terraform init                            
        run: terraform init -upgrade                    
                                                        
      - name: Terraform validate                        
        run: terraform validate                         
                                                        
      - name: Terraform plan                            
        run: terraform plan -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
