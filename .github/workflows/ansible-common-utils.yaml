---
name: Ansible Common Utils

on:
  push:
    branches:
      - main
    paths:
      - ansible/common-utils.yml
      - ansible/tasks/common.yml

env:
  TARGET_VM: ${{ github.event.client_payload.target_vm }}

concurrency:
  group: terraform-apply-prod
  cancel-in-progress: false

jobs:
  run-playbook:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Run Ansible playbook
        uses: dawidd6/action-ansible-playbook@v9
        with:
          playbook: ansible/common-utils.yml
          options: |
            --inventory ansible/inventory.ini
            --user root
