- name: Add Cilium helm repo
  command: helm repo add cilium https://helm.cilium.io
  register: helm_repo_add
  changed_when: '"has been added" in helm_repo_add.stdout'
  failed_when:
    - helm_repo_add.rc != 0
    - '"already exists" not in helm_repo_add.stderr'

- name: Install Cilium
  command: >
    helm install cilium cilium/cilium
    --version {{ cilium_version }}
    --namespace kube-system
    --set kubeProxyReplacement=true
    --set k8sServiceHost={{ node_ip.stdout }}
    --set k8sServicePort=6443
    --set operator.replicas=1
    --set ipam.mode=kubernetes
    --set hubble.relay.enabled=true
    --set hubble.ui.enabled=true
  environment:
    KUBECONFIG: /root/.kube/config
  register: cilium_install
  failed_when:
    - cilium_install.rc != 0
    - '"cannot re-use a name that is still in use" not in cilium_install.stderr'
  changed_when: cilium_install.rc == 0

- name: Get latest cilium-cli stable version
  uri:
    url: https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt
    return_content: yes
  register: cilium_cli_stable

- name: Install cilium-cli
  unarchive:
    src: "https://github.com/cilium/cilium-cli/releases/download/{{ cilium_cli_stable.content | trim }}/cilium-linux-{{ dpkg_arch.stdout }}.tar.gz"
    dest: /usr/local/bin
    remote_src: yes
    creates: /usr/local/bin/cilium

- name: Wait for Cilium to converge
  command: cilium status --wait
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
